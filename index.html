<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>화장실 비번 공유</title>
  <link rel="stylesheet" href="/src/css/style.css" />
  <script>
  window._kakaoReady = new Promise(function(resolve) {
    var s = document.createElement('script');
    s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=e7de810a316c3feeb7d1843e6dbddd4e&autoload=false&libraries=services';
    s.onload = function() {
      window.kakao.maps.load(resolve);
    };
    document.head.appendChild(s);
  });
</script>
</head>
<body>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="장소 검색 (예: 스타필드 미사)" />
    <button id="search-btn" type="button" aria-label="검색">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
    </button>
  </div>

  <div id="map" style="width:100%;height:100vh;"></div>

  <button id="gps-btn" type="button" aria-label="내 위치 찾기">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
    </svg>
  </button>

  <div id="backdrop"></div>

  <div id="bottom-sheet">
    <div class="drag-handle"></div>
    <h2 id="bs-building"></h2>
    <span id="bs-lock" class="lock-badge"></span>
    <dl>
      <dt id="bs-distance-label" class="distance-label" style="display:none">거리</dt>
      <dd id="bs-distance" class="distance-value" style="display:none"></dd>
      <dt>층</dt>
      <dd id="bs-floor"></dd>
      <dt>위치 메모</dt>
      <dd id="bs-memo"></dd>
      <dt>비밀번호</dt>
      <dd id="bs-password"></dd>
    </dl>
    <div id="bs-actions" class="bs-actions">
      <button id="edit-btn" type="button">수정</button>
      <button id="copy-btn" type="button">복사</button>
      <button id="delete-btn" type="button" class="delete-btn">삭제</button>
    </div>
    <div id="bs-edit-actions" class="bs-actions" style="display:none">
      <button id="save-edit-btn" type="button">저장</button>
      <button id="cancel-edit-btn" type="button" class="secondary">취소</button>
    </div>
  </div>

  <div id="register-sheet">
    <div class="drag-handle"></div>
    <h2>화장실 등록</h2>
    <form id="register-form">
      <label for="reg-building">건물명 <span class="required">*</span></label>
      <input id="reg-building" type="text" name="buildingName" required placeholder="예: 스타필드 미사" />

      <label for="reg-floor">층</label>
      <input id="reg-floor" type="text" name="floor" placeholder="예: B1, 3F" />

      <label for="reg-memo">위치 메모</label>
      <input id="reg-memo" type="text" name="locationMemo" placeholder="예: 푸드코트 옆 통로" />

      <label for="reg-category">카테고리</label>
      <input id="reg-category" type="text" name="category" placeholder="예: 상업시설, 공공시설" />

      <fieldset>
        <label>
          <input id="reg-haslock" type="checkbox" name="hasLock" role="switch" />
          잠금 있음
        </label>
      </fieldset>

      <div id="reg-password-group" style="display:none">
        <label for="reg-password">비밀번호</label>
        <input id="reg-password" type="text" name="password" placeholder="비밀번호 입력" />
      </div>

      <input id="reg-lat" type="hidden" name="latitude" />
      <input id="reg-lng" type="hidden" name="longitude" />

      <div class="bs-actions">
        <button type="submit">등록</button>
        <button id="cancel-register-btn" type="button" class="secondary">취소</button>
      </div>
    </form>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>화장실 정보를 불러오는 중...</p>
  </div>

  <div id="toast" class="toast"></div>

  <div id="error-state">
    <div class="error-card">
      <h2>데이터를 불러올 수 없습니다</h2>
      <p>인터넷 연결을 확인하고 다시 시도해 주세요.</p>
      <button id="retry-btn">다시 시도</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
