<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화장실 비번 공유</title>
  <link rel="stylesheet" href="/src/css/style.css" />
  <script>
  window._kakaoReady = new Promise(function(resolve) {
    var s = document.createElement('script');
    s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=e7de810a316c3feeb7d1843e6dbddd4e&autoload=false';
    s.onload = function() {
      window.kakao.maps.load(resolve);
    };
    document.head.appendChild(s);
  });
</script>
</head>
<body>
  <div id="map" style="width:100%;height:100vh;"></div>

  <div id="backdrop"></div>

  <div id="bottom-sheet">
    <div class="drag-handle"></div>
    <h2 id="bs-building"></h2>
    <span id="bs-lock" class="lock-badge"></span>
    <dl>
      <dt>층</dt>
      <dd id="bs-floor"></dd>
      <dt>위치 메모</dt>
      <dd id="bs-memo"></dd>
      <dt>비밀번호</dt>
      <dd id="bs-password"></dd>
    </dl>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>화장실 정보를 불러오는 중...</p>
  </div>

  <div id="error-state">
    <div class="error-card">
      <h2>데이터를 불러올 수 없습니다</h2>
      <p>인터넷 연결을 확인하고 다시 시도해 주세요.</p>
      <button id="retry-btn">다시 시도</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
